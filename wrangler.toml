name = "high-school-chinese-recitation-tool"
main = "worker/index.js"
compatibility_date = "2024-09-23"

[assets]
directory = "./public/"
binding = "ASSETS"
run_worker_first = true
exclude = [".git/**", ".github/**", ".claude/**", "worker/**", "node_modules/**", ".omc/**"]

[ai]
binding = "AI"

[observability]
[observability.logs]
enabled = true
invocation_logs = true

[[d1_databases]]
binding = "btw"
database_name = "recitation-stats"
database_id = "771cf90b-ec0c-42e5-a8dd-3287e3e5e722"
